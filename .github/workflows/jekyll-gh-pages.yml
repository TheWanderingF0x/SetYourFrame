# Jekyll landing + Vite (Camera Lab) → GitHub Pages
# Uses Node 24–compatible action major versions; see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Until all composite actions ship Node 24 runtimes, opt in per GitHub guidance
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: camera-lab/package-lock.json

      - name: Build Camera Lab (Vite)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          cd camera-lab
          npm ci
          npm run build -- --base=/${REPO_NAME}/camera-lab/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Publish Camera Lab into site
        run: |
          set -euo pipefail
          # jekyll-build-pages writes _site via Docker — directory is often root:root here
          sudo chown -R "$USER:$USER" _site
          mkdir -p _site/camera-lab
          cp -r camera-lab/dist/. _site/camera-lab/
          touch _site/.nojekyll

      # v4 excludes dotfiles from the tarball and drops .nojekyll — keep v3 until GitHub adds an opt-in
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
