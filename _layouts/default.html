<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #111;
        --muted: #555;
        --link: #2563eb;
        --bg: #fff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f3f4f6;
          --muted: #9ca3af;
          --link: #60a5fa;
          --bg: #0f1117;
        }
      }
      body {
        font-family: system-ui, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1.25rem;
        color: var(--fg);
        background: var(--bg);
      }
      a {
        color: var(--link);
      }
      .muted {
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>{{ content }}</main>
  </body>
</html>
